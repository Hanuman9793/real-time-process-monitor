<!DOCTYPE html>
<html>
<head>
  <title>Process Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Real-Time Dashboard</h1>

<h2>CPU Usage: <span id="cpu">Loading...</span>%</h2>
<h2>Memory Usage: <span id="memory">Loading...</span></h2>

<table border="1">
  <thead>
    <tr>
      <th>PID</th>
      <th>Name</th>
      <th>CPU</th>
      <th>Memory</th>
    </tr>
  </thead>
  <tbody id="processTable"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
