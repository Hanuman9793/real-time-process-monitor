<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Process Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>⚙ Real-Time Process Dashboard</h1>
    <div id="lastUpdated" class="last-updated">Waiting...</div>
  </header>

  <!-- Alert Banner -->
  <div id="alertBox" class="alert-box"></div>

  <!-- ── Stat Cards ── -->
  <section class="cards">

    <div class="card">
      <h2>CPU Usage</h2>
      <div class="big-value" id="cpuValue">–</div>
      <div class="progress-track">
        <div class="progress-bar" id="cpuBar"></div>
      </div>
      <canvas id="cpuChart" height="100"></canvas>
    </div>

    <div class="card">
      <h2>Memory Usage</h2>
      <div class="mem-row">
        <canvas id="memChart" width="120" height="120"></canvas>
        <div class="mem-info">
          <p><span class="label">Used</span> <strong id="memUsed">–</strong></p>
          <p><span class="label">Total</span> <strong id="memTotal">–</strong></p>
          <p><span class="label">Usage</span> <strong id="memPercent">–</strong></p>
          <div class="progress-track">
            <div class="progress-bar" id="memBar" style="background:#ef5350"></div>
          </div>
        </div>
      </div>
    </div>

  </section>

  <!-- ── Process Table ── -->
  <section class="table-section">
    <div class="table-header">
      <h2>Processes <span id="procCount" class="badge"></span></h2>
      <div class="controls">
        <input type="text" id="search" placeholder="🔍 Search by name…" oninput="fetchData()" />
        <select id="sort" onchange="fetchData()">
          <option value="cpu">Sort: CPU</option>
          <option value="memory">Sort: Memory</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>PID</th>
            <th>Name</th>
            <th>CPU %</th>
            <th>Mem %</th>
            <th>State</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="processTable"></tbody>
      </table>
    </div>
  </section>
  <canvas id="cpuChart"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
